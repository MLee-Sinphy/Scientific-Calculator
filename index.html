<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="A minimalist scientific calculator built with HTML, CSS, and JavaScript."
    >

    <meta name="author" content="M Lee">

    <title>Scientific Calculator</title>

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <main class="page">

        <header class="page-header">
            <h1>Scientific Calculator</h1>

            <p>
                A minimalist calculator for elementary and scientific computations.
            </p>
        </header>

        <section
            class="calculator"
            aria-label="Scientific calculator"
        >

            <div class="calculator-display">
                <div
                    id="expression-display"
                    class="expression-display"
                    aria-live="polite"
                >
                    0
                </div>

                <div
                    id="result-display"
                    class="result-display"
                    aria-live="polite"
                >
                    0
                </div>
            </div>

            <div class="mode-selector">
                <button
                    type="button"
                    class="mode-button active"
                    data-mode="rad"
                >
                    RAD
                </button>

                <button
                    type="button"
                    class="mode-button"
                    data-mode="deg"
                >
                    DEG
                </button>
            </div>

            <div class="calculator-grid">

                <button
                    type="button"
                    class="calculator-button utility-button"
                    data-action="clear"
                >
                    AC
                </button>

                <button
                    type="button"
                    class="calculator-button utility-button"
                    data-action="backspace"
                    aria-label="Delete last character"
                >
                    ⌫
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-value="("
                >
                    (
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-value=")"
                >
                    )
                </button>

                <button
                    type="button"
                    class="calculator-button operator-button"
                    data-value="/"
                    aria-label="Divide"
                >
                    ÷
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-function="sin"
                >
                    sin
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-function="cos"
                >
                    cos
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-function="tan"
                >
                    tan
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-function="log"
                >
                    log
                </button>

                <button
                    type="button"
                    class="calculator-button operator-button"
                    data-value="*"
                    aria-label="Multiply"
                >
                    ×
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-function="sinh"
                >
                    sinh
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-function="cosh"
                >
                    cosh
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-function="tanh"
                >
                    tanh
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-function="ln"
                >
                    ln
                </button>

                <button
                    type="button"
                    class="calculator-button operator-button"
                    data-value="-"
                    aria-label="Subtract"
                >
                    −
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-function="sqrt"
                >
                    √
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-function="square"
                >
                    x²
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-value="^"
                >
                    xʸ
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-function="exp"
                >
                    exp
                </button>

                <button
                    type="button"
                    class="calculator-button operator-button"
                    data-value="+"
                    aria-label="Add"
                >
                    +
                </button>

                <button
                    type="button"
                    class="calculator-button number-button"
                    data-value="7"
                >
                    7
                </button>

                <button
                    type="button"
                    class="calculator-button number-button"
                    data-value="8"
                >
                    8
                </button>

                <button
                    type="button"
                    class="calculator-button number-button"
                    data-value="9"
                >
                    9
                </button>

                <button
                    type="button"
                    class="calculator-button constant-button"
                    data-constant="pi"
                >
                    π
                </button>

                <button
                    type="button"
                    class="calculator-button constant-button"
                    data-constant="e"
                >
                    e
                </button>

                <button
                    type="button"
                    class="calculator-button number-button"
                    data-value="4"
                >
                    4
                </button>

                <button
                    type="button"
                    class="calculator-button number-button"
                    data-value="5"
                >
                    5
                </button>

                <button
                    type="button"
                    class="calculator-button number-button"
                    data-value="6"
                >
                    6
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-function="percent"
                >
                    %
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-function="inverse"
                >
                    1/x
                </button>

                <button
                    type="button"
                    class="calculator-button number-button"
                    data-value="1"
                >
                    1
                </button>

                <button
                    type="button"
                    class="calculator-button number-button"
                    data-value="2"
                >
                    2
                </button>

                <button
                    type="button"
                    class="calculator-button number-button"
                    data-value="3"
                >
                    3
                </button>

                <button
                    type="button"
                    class="calculator-button function-button"
                    data-function="sign"
                >
                    ±
                </button>

                <button
                    type="button"
                    class="calculator-button equals-button"
                    data-action="calculate"
                >
                    =
                </button>

                <button
                    type="button"
                    class="calculator-button number-button zero-button"
                    data-value="0"
                >
                    0
                </button>

                <button
                    type="button"
                    class="calculator-button number-button"
                    data-value="."
                >
                    .
                </button>

            </div>

        </section>

        <footer class="page-footer">
            <p>
                © 2026 M Lee. Educational project under active development.
            </p>
        </footer>

    </main>

    <script src="assets/js/calculator.js"></script>

</body>

</html>
